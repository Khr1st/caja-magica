<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A4731">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caja Mágica">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Caja Mágica — KYNEX</title>
<style>
:root {
  --bg: #0F1117;
  --surface: #1A1D27;
  --surface2: #22263A;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.15);
  --accent: #1A4731;
  --accent-hover: #225c3f;
  --green: #2ECC71;
  --red: #E74C3C;
  --yellow: #F39C12;
  --blue: #3498DB;
  --text: #F0F0F0;
  --text2: #9CA3AF;
  --text3: #6B7280;
  --r: 12px;
  --r-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;height:100vh}

/* Header */
header{height:56px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-text{font-weight:600;font-size:17px;color:var(--text)}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite ease-in-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-right{display:flex;align-items:center;gap:12px}
.sub-text{font-size:12px;color:var(--text3)}
.btn-config{background:transparent;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:8px;border-radius:6px;line-height:1}
.btn-config:hover{color:var(--text)}

/* Main layout */
main{flex:1;display:flex;overflow:hidden}
.panel-chat{width:380px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface)}
.panel-dash{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Dashboard */
.dash-scroll{flex:1;overflow-y:auto;padding:16px}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.m-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.m-value{font-size:20px;font-weight:600}

/* Semáforo */
.semaforo{display:flex;align-items:center;gap:10px;padding:12px 16px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.sem-dot{width:10px;height:10px;border-radius:50%;transition:background .3s}
.sem-dot.pulse-fast{animation:semPulse .8s infinite}
@keyframes semPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
#sem-msg{font-size:13px;color:var(--text2)}

/* Export button */
.btn-export{background:var(--accent);color:white;border:none;border-radius:var(--r-sm);padding:12px 20px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:16px;font-family:inherit;transition:background .15s}
.btn-export:hover{background:var(--accent-hover)}
.btn-export:disabled{opacity:.7;cursor:wait}

/* Log */
.log-section{flex:1;overflow-y:auto}
.log-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.log-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.badge-ingreso{background:rgba(46,204,113,.12);color:var(--green)}
.badge-egreso{background:rgba(231,76,60,.12);color:var(--red)}
.badge-ahorro{background:rgba(52,152,219,.12);color:var(--blue)}
.badge-proyeccion{background:rgba(243,156,18,.12);color:var(--yellow)}
.log-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-amt{font-weight:500;white-space:nowrap}
.btn-del{background:transparent;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px 8px;min-width:36px;min-height:36px;line-height:1;border-radius:6px;font-family:inherit}
.btn-del:hover{color:var(--red);background:rgba(231,76,60,.1)}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-state svg{margin-bottom:12px;opacity:.4}

/* Chat panel */
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text2)}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:9px 14px;font-size:13px;line-height:1.5;word-wrap:break-word}
.msg-user{align-self:flex-end;background:var(--accent);color:white;border-radius:14px 14px 4px 14px}
.msg-bot{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:14px 14px 14px 4px}
.msg-loading{color:var(--text3);font-style:italic}
.dots span{animation:blink 1.4s infinite both}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Chips */
.chips-row{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips-row::-webkit-scrollbar{display:none}
.chip{background:transparent;border:1px solid var(--border);border-radius:20px;padding:6px 13px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:border-color .15s,color .15s;font-family:inherit}
.chip:hover{border-color:var(--border-hover);color:var(--text)}

/* Input area */
.input-area{display:flex;gap:8px;padding:12px;background:var(--surface);border-top:1px solid var(--border)}
.input-area textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:16px;font-family:inherit;resize:none;min-height:42px;max-height:120px;line-height:1.5;outline:none}
.input-area textarea:focus{border-color:rgba(255,255,255,.25)}
.input-area textarea::placeholder{color:var(--text3)}
#btn-send{background:var(--accent);color:white;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;min-height:42px;min-width:80px;flex-shrink:0;font-family:inherit;transition:background .15s}
#btn-send:hover:not(:disabled){background:var(--accent-hover)}
#btn-send:disabled{opacity:.45;cursor:not-allowed}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:min(380px,90vw)}
.modal-card h3{font-weight:600;font-size:16px;margin-bottom:20px}
.modal-card label{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--text2);margin-bottom:16px}
.modal-card input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit}
.modal-card input:focus{border-color:rgba(255,255,255,.25)}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.modal-btns button{padding:10px 20px;border-radius:var(--r-sm);font-size:14px;cursor:pointer;font-family:inherit;border:none}
.modal-btns button:first-child{background:var(--accent);color:white}
.modal-btns button:first-child:hover{background:var(--accent-hover)}
.modal-btns button:last-child{background:transparent;border:1px solid var(--border);color:var(--text2)}

/* Mobile */
@media(max-width:768px){
  main{flex-direction:column}
  .panel-dash{order:1;flex:1;overflow:hidden}
  .panel-chat{order:2;width:100%;height:320px;flex-shrink:0;border-right:none;border-top:1px solid var(--border)}
  .input-area{position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));background:var(--surface);border-top:1px solid var(--border)}
  main{padding-bottom:120px}
  .btn-export{width:100%}
  .metrics-grid{grid-template-columns:1fr 1fr}
}

@media(min-width:769px){
  .metrics-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-text">Caja Magica</span>
    <div class="pulse-dot"></div>
  </div>
  <div class="header-right">
    <span class="sub-text">KYNEX Ventures</span>
    <button class="btn-config" onclick="toggleModal()">&#9881;</button>
  </div>
</header>

<main>
  <!-- Chat panel -->
  <div class="panel-chat">
    <div class="chat-header">Chat de tesoreria</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chips-row" id="chips-row">
      <span class="chip" data-text="mis papás me pasaron ">&#128229; Mesada</span>
      <span class="chip" data-text="gasté  en almuerzo y transporte">&#127861; Comida/transp</span>
      <span class="chip" data-text="pagué la tarjeta Bancolombia completa por ">&#128179; Pago TC</span>
      <span class="chip" data-text="facturé  horas de consultoría a $25 USD">&#128188; Consultoría</span>
      <span class="chip" data-text="vendí una plantilla en Gumroad por $20 USD">&#128187; Gumroad</span>
      <span class="chip" data-text="pasé  a IBKR este mes">&#128200; IBKR</span>
    </div>
    <div class="input-area">
      <textarea id="inp" placeholder="Ej: mis papás me pasaron 900k..." rows="1"></textarea>
      <button id="btn-send" onclick="enviar()">Enviar</button>
    </div>
  </div>

  <!-- Dashboard panel -->
  <div class="panel-dash">
    <div class="dash-scroll">
      <div class="metrics-grid">
        <div class="metric-card" id="card-caja">
          <div class="m-label">Caja disponible</div>
          <div class="m-value" id="val-caja">&mdash; COP</div>
        </div>
        <div class="metric-card">
          <div class="m-label">Flujo neto</div>
          <div class="m-value" id="val-neto">&mdash; COP</div>
        </div>
        <div class="metric-card">
          <div class="m-label">Ingresos</div>
          <div class="m-value" id="val-ing" style="color:var(--green)">&mdash; COP</div>
        </div>
        <div class="metric-card">
          <div class="m-label">Egresos</div>
          <div class="m-value" id="val-egr" style="color:var(--red)">&mdash; COP</div>
        </div>
      </div>

      <div class="semaforo">
        <div class="sem-dot" id="sem-dot" style="background:var(--text3)"></div>
        <span id="sem-msg">Sin movimientos aun</span>
      </div>

      <button class="btn-export" onclick="exportarExcel()">&#8595; Exportar Excel</button>

      <div class="log-section">
        <div class="log-title">Movimientos del mes</div>
        <div id="log-list">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="12" width="32" height="24" rx="4" stroke="currentColor" stroke-width="2"/><path d="M16 22h16M16 28h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <div>Registra tu primer movimiento en el chat</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Modal config -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-card">
    <h3>Configuracion</h3>
    <label>Tasa COP/USD<input type="number" id="cfg-tasa"></label>
    <label>Caja minima COP<input type="number" id="cfg-minima"></label>
    <div class="modal-btns">
      <button onclick="guardarConfig()">Guardar</button>
      <button onclick="toggleModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// Estado
const S = { movimientos: [], resumen: null, cargando: false };

// Init
async function init() {
  await Promise.all([cargarResumen(), cargarMovimientos()]);
  restaurarChat();
  registrarSW();
  setInterval(() => { cargarResumen(); cargarMovimientos(); }, 30000);
}

// API helper
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// Enviar movimiento
async function enviar() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt || S.cargando) return;
  inp.value = '';
  autoResize(inp);
  S.cargando = true;
  document.getElementById('btn-send').disabled = true;

  addMsg(txt, true);
  guardarChat(txt, true);
  const loadId = showLoading();

  try {
    const r = await api('POST', '/api/movimiento', { texto: txt });
    removeLoading(loadId);
    addMsg(r.mensaje, false);
    guardarChat(r.mensaje, false);
    if (r.ok) {
      await Promise.all([cargarResumen(), cargarMovimientos()]);
    }
  } catch(e) {
    removeLoading(loadId);
    addMsg('Error de conexion. Verifica que el servidor este corriendo.', false);
  }

  S.cargando = false;
  document.getElementById('btn-send').disabled = false;
  document.getElementById('inp').focus();
}

// Cargar resumen
async function cargarResumen() {
  try {
    S.resumen = await api('GET', '/api/resumen');
    renderMetricas();
  } catch(e) { console.error('resumen error', e); }
}

// Cargar movimientos
async function cargarMovimientos() {
  try {
    S.movimientos = await api('GET', '/api/movimientos');
    renderLog();
  } catch(e) { console.error('movimientos error', e); }
}

// Eliminar
async function eliminar(id) {
  if (!confirm('Eliminar este movimiento?')) return;
  await api('DELETE', '/api/movimiento/' + id);
  await Promise.all([cargarResumen(), cargarMovimientos()]);
}

// Exportar Excel
async function exportarExcel() {
  const btn = document.querySelector('.btn-export');
  btn.textContent = 'Generando...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/exportar');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'CajaMagica_' + new Date().toISOString().slice(0,7) + '.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { alert('Error al generar el Excel'); }
  btn.textContent = '\u2193 Exportar Excel';
  btn.disabled = false;
}

// Render métricas
function renderMetricas() {
  if (!S.resumen) return;
  const r = S.resumen;
  document.getElementById('val-caja').textContent = fmtCOP(r.neto_cop);
  document.getElementById('val-neto').textContent = (r.neto_cop >= 0 ? '+' : '') + fmtCOP(r.neto_cop);
  document.getElementById('val-ing').textContent = '+' + fmtCOP(r.ingresos_cop);
  document.getElementById('val-egr').textContent = '-' + fmtCOP(r.egresos_cop);

  const colors = { verde:'var(--green)', amarillo:'var(--yellow)', rojo:'var(--red)', sin_datos:'var(--text3)' };
  const dot = document.getElementById('sem-dot');
  dot.style.background = colors[r.semaforo] || 'var(--text3)';
  dot.className = 'sem-dot' + (r.semaforo === 'rojo' ? ' pulse-fast' : '');
  document.getElementById('sem-msg').textContent = r.semaforo_mensaje || r.semaforo;
  document.getElementById('val-caja').style.color = colors[r.semaforo] || 'var(--text)';
}

// Render log
function renderLog() {
  const list = document.getElementById('log-list');
  if (!S.movimientos.length) {
    list.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="12" width="32" height="24" rx="4" stroke="currentColor" stroke-width="2"/><path d="M16 22h16M16 28h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><div>Registra tu primer movimiento en el chat</div></div>';
    return;
  }
  const tipos = { ingreso:'Ingreso', egreso:'Egreso', ahorro:'Ahorro', proyeccion:'Proyeccion' };
  list.innerHTML = S.movimientos.map(m => {
    const sign = m.tipo === 'ingreso' ? '+' : m.tipo === 'ahorro' ? '~' : '-';
    const amtColor = m.tipo === 'ingreso' ? 'var(--green)' : m.tipo === 'proyeccion' ? 'var(--yellow)' : 'var(--red)';
    const amtStr = m.moneda === 'USD' ? sign + '$' + m.monto_original + ' USD' : sign + fmtCOP(m.monto_cop);
    return '<div class="log-item">' +
      '<span class="badge badge-' + m.tipo + '">' + (tipos[m.tipo] || m.tipo) + '</span>' +
      '<span class="log-desc" title="' + esc(m.descripcion) + '">' + esc(m.descripcion) + '</span>' +
      '<span class="log-amt" style="color:' + amtColor + '">' + amtStr + '</span>' +
      '<button class="btn-del" onclick="eliminar(\'' + m.id + '\')" title="Eliminar">\u00d7</button>' +
      '</div>';
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Chat helpers
function addMsg(txt, isUser) {
  const area = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg ' + (isUser ? 'msg-user' : 'msg-bot');
  d.textContent = txt;
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}

function showLoading() {
  const area = document.getElementById('chat-messages');
  const d = document.createElement('div');
  const id = 'load-' + Date.now();
  d.id = id;
  d.className = 'msg msg-bot msg-loading';
  d.innerHTML = 'Clasificando<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// Chat persistence
const CHAT_KEY = 'cm_chat_v1';
function guardarChat(txt, isUser) {
  const hist = JSON.parse(localStorage.getItem(CHAT_KEY) || '[]');
  hist.push({ txt, isUser, ts: Date.now() });
  if (hist.length > 30) hist.splice(0, hist.length - 30);
  localStorage.setItem(CHAT_KEY, JSON.stringify(hist));
}
function restaurarChat() {
  const hist = JSON.parse(localStorage.getItem(CHAT_KEY) || '[]');
  if (hist.length) {
    hist.forEach(m => addMsg(m.txt, m.isUser));
  } else {
    addMsg('Listo. Escribe lo que entro o salio \u2014 en tus palabras. Los chips de arriba son atajos para lo mas comun.', false);
  }
}

// Config modal
function toggleModal() {
  const m = document.getElementById('modal');
  m.style.display = m.style.display === 'none' ? 'flex' : 'none';
  if (m.style.display === 'flex' && S.resumen) {
    document.getElementById('cfg-tasa').value = S.resumen.tasa_cop_usd;
    document.getElementById('cfg-minima').value = S.resumen.caja_minima_cop;
  }
}
async function guardarConfig() {
  const tasa = parseInt(document.getElementById('cfg-tasa').value);
  const minima = parseInt(document.getElementById('cfg-minima').value);
  await api('POST', '/api/config', { tasa_cop_usd: tasa, caja_minima_cop: minima });
  toggleModal();
  await cargarResumen();
}

// Utils
function fmtCOP(n) {
  return '$\u00a0' + Math.abs(Math.round(n)).toLocaleString('es-CO') + '\u00a0COP';
}
function autoResize(el) {
  el.style.height = '42px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Chips
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    const inp = document.getElementById('inp');
    inp.value = c.dataset.text;
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
    autoResize(inp);
  });
});

// Keyboard
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});
document.getElementById('inp').addEventListener('input', function() { autoResize(this); });

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) toggleModal();
});

// Service Worker
function registrarSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .catch(e => console.log('SW no registrado:', e));
  }
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
